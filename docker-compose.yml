services:
  db:
    image: postgres:16
    container_name: link-shortener-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: linkshortener
      POSTGRES_PASSWORD: linkshortener
      POSTGRES_DB: linkshortener
    volumes:
      - postgres_data:/data

volumes:
  postgres_data:
